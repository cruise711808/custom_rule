# -- 全局配置 --
allow-lan: true 
bind-address: "*"
mode: rule
log-level: warning
ipv6: true # 开启以支持特定域名的 IPv6 解析
find-process-mode: off # 控制是否让 Clash 去匹配进程
unified-delay: true 
tcp-concurrent: true

# -- 外部控制与缓存 --
external-controller: 0.0.0.0:9090
secret: "clash-ex"
external-ui: "/usr/share/openclash/ui"
external-ui-url: "https://github.com/MetaCubeX/metacubexd/archive/refs/heads/gh-pages.zip" #从 GitHub Pages 分支获取
profile:
  store-selected: true

# -- GEO数据 --
geodata-mode: false # 更改 geoip 使用文件，mmdb 或者 dat，可选 true/false,true为 dat，此项有默认值 false
geodata-loader: standard
geo-auto-update: true
geo-update-interval: 48
geox-url:
  geoip: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat"
  geosite: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat"
  mmdb: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/country.mmdb"
  asn: "https://github.com/xishang0128/geoip/releases/download/latest/GeoLite2-ASN.mmdb"
global-ua: clash.meta


# -- 入站与 Tun --
port: 7890
socks-port: 7891
mixed-port: 7892
tun:
  enable: true
  stack: mixed
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true
  dns-hijack: [any:53, tcp://any:53]
  route-exclude-address-set: [base_lancidr, base_cncidr]

# -- 流量嗅探 --
sniffer:
  enable: true
  parse-pure-ip: true
  sniff:
    HTTP: { ports: [80, 8080-8880], override-destination: true }
    TLS: { ports: [443, 8443], override-destination: true }
    QUIC: { ports: [443, 8443], override-destination: true }
  skip-domain:
    - "+.sharvo.top"
    - "Mijia Cloud"
    - "rule-set:base_private"
    - "rule-set:base_direct"