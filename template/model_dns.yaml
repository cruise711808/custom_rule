dns:
  enable: true
  cache-algorithm: arc
  prefer-h3: true
  use-hosts: true
  use-system-hosts: true
  respect-rules: false # dns 连接遵守路由规则，需配置 proxy-server-nameserver | 强烈不建议和 prefer-h3 一起使用
  listen: ':1053'
  ipv6: true
  default-nameserver: # 默认 DNS, 用于解析 DNS 服务器 的域名
    - tls://223.5.5.5:853
    - tls://2400:3200::1:853
    - tls://101.101.101.101:853
  enhanced-mode: 'redir-host'
  nameserver-policy: # 指定域名查询的解析服务器，可使用 geosite, 优先于 nameserver/fallback 查询
    "geosite:cn": &cn_dns
      - 223.6.6.6
      - 119.28.28.28
      - 114.114.114.114
    "geosite:geolocation-!cn": &os_dns
      - https://doh.opendns.com/dns-query
      - https://dns.google/dns-query
      - https://cloudflare-dns.com/dns-query
    "geosite:category-companies": *os_dns
    "geosite:category-porn": *os_dns
    "geosite:gfw": *os_dns
    "geosite:geolocation-cn": *cn_dns
    "geosite:category-entertainment": *os_dns  
    "geosite:category-media": *os_dns
    "geosite:google": *os_dns
    "geosite:category-ecommerce": *os_dns
    "geosite:category-games": *os_dns
    "geosite:category-companies@cn": *cn_dns
    "geosite:category-games-!cn": *os_dns
    "geosite:microsoft": *os_dns
    "geosite:category-game-platforms-download": *os_dns
    "geosite:category-entertainment-cn": *cn_dns
    "geosite:category-social-media-!cn": *os_dns
    "geosite:tencent": *cn_dns
    "geosite:category-dev": *os_dns
    "geosite:tld-!cn": *os_dns
    "geosite:category-media-cn": *cn_dns
    "geosite:category-games-cn": *cn_dns
    "geosite:category-cdn-!cn": *os_dns
    "geosite:microsoft@cn": *cn_dns
    "geosite:google@cn": *cn_dns
    "geosite:category-ai-chat-!cn": *os_dns
    "geosite:category-ai-!cn": *os_dns
    "geosite:category-cdn-cn": *cn_dns
    "geosite:private": *cn_dns   
    "geosite:category-ads-all": rcode://success
    "geosite:category-ads-all@ads": rcode://success
    "geosite:category-ads@ads": rcode://success
    "geosite:win-spy": rcode://success
    "geosite:category-public-tracker": rcode://success
    "*.sharvo.top": [223.5.5.5, 2400:3200::1] # 您的域名直连 IPv6 解析
  nameserver: # 默认的域名解析服务器
    - tls://dns.alidns.com
    - tls://dot.pub
  fallback: # 后备域名解析服务器，一般情况下使用境外 DNS, 保证结果可信
    - https://doh.opendns.com/dns-query
    - https://dns.google/dns-query
    - https://cloudflare-dns.com/dns-query
  proxy-server-nameserver:
    - tls://dns.alidns.com
    - tls://dot.pub
    - tls://223.5.5.5
  direct-nameserver: # 用于 direct 出口域名解析的 DNS 服务器，如果不填则遵循 nameserver-policy、nameserver 和 fallback 的配置
    - 223.6.6.6
    - 119.28.28.28
  direct-nameserver-follow-policy: false # 是否遵循 nameserver-policy，默认为不遵守，仅当 direct-nameserver 不为空时生效
  fallback-filter: # 后备域名解析服务器筛选，满足条件的将使用 fallback结果或只使用 fallback解析
    geoip: true
    geoip-code: CN
    ipcidr:
    - ::/128
    - ::1/128
    - 2001::/32
    - 0.0.0.0/8
    - 10.0.0.0/8
    - 100.64.0.0/10
    - 127.0.0.0/8
    - 169.254.0.0/16
    - 172.16.0.0/12
    - 192.0.0.0/24
    - 192.0.2.0/24
    - 192.88.99.0/24
    - 192.168.0.0/16
    - 198.18.0.0/15
    - 198.51.100.0/24
    - 203.0.113.0/24
    - 224.0.0.0/4
    - 240.0.0.0/4
    - 255.255.255.255/32
    domain:
    - "+.google.com"
    - "+.facebook.com"
    - "+.youtube.com"
    - "+.github.com"
    - "+.githubusercontent.com"
    - "+.googlevideo.com"
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"



